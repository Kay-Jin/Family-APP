# Family App — continuous integration (GitHub Actions)
#
# Triggers: every push and pull request to main/master.
# Jobs:
#   - mobile: Flutter analyze + tests
#   - backend: pytest (Flask API, isolated SQLite)
#   - supabase-schema: optional; runs only if secret SUPABASE_DB_URL is set
#
# First-time setup:
#   1. Create a repository on https://github.com/new and push this project.
#   2. Open the repo → Actions → enable workflows if prompted.
#   3. (Optional) Settings → Secrets and variables → Actions → New repository secret
#      Name: SUPABASE_DB_URL
#      Value: Postgres connection string (Project Settings → Database, use URI or pooler).

name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  mobile:
    name: Flutter (analyze + test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - run: flutter pub get
      - run: flutter analyze --no-fatal-infos --no-fatal-warnings
      - run: flutter test

  backend:
    name: Python (pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - run: pip install -r requirements.txt
      - run: python -m pytest tests -vv --tb=short

  supabase-schema:
    name: Supabase (schema SQL checks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install PostgreSQL client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Run supabase/tests/schema_checks.sql
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          set -euo pipefail
          if [ -z "${SUPABASE_DB_URL:-}" ]; then
            echo "Skipping: SUPABASE_DB_URL secret not set (optional)."
            echo "Add it under Settings → Secrets and variables → Actions to enforce schema checks in CI."
            exit 0
          fi
          OUT="$(psql "$SUPABASE_DB_URL" -v ON_ERROR_STOP=1 -t -A -f supabase/tests/schema_checks.sql)"
          echo "$OUT"
          LINE="$(echo "$OUT" | grep -E '^[0-9]+\|' | head -n1 || true)"
          if [ -z "$LINE" ]; then
            echo "::error::Could not parse schema_checks output (expected a line like 0|[])."
            exit 1
          fi
          FAILED="$(echo "$LINE" | cut -d'|' -f1 | tr -d '[:space:]')"
          if [ "$FAILED" != "0" ]; then
            echo "::error::Supabase schema_checks failed (failed_count=$FAILED). See details JSON above."
            exit 1
          fi
          echo "Supabase schema checks passed."
